name: counting-env
# For NVIDIA GPUs, including Blackwell (sm_120 / RTX 50xx) and older.
# PyTorch is installed from the official CUDA-specific wheel index (cu128) so
# kernels for new compute capabilities are included. Older GPUs also work with
# cu128 builds since nvcc ships kernels for all prior archs.
channels:
  - conda-forge
dependencies:
  - python=3.11
  - pip
  - numpy
  - pillow
  - pandas
  - pyyaml
  - tqdm
  - scipy
  - scikit-learn
  - opencv
  - tensorboard
  - pytest
  - pytest-cov
  - pip:
      - --extra-index-url https://download.pytorch.org/whl/cu128
      - torch>=2.5
      - torchvision>=0.20
      - typer>=0.12
      - pydantic>=2.0
      - albumentations
      - timm
      - rich
